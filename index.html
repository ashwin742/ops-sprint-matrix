<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Sprint Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-white">Ops Sprint Matrix</h1>
            <p class="text-xs text-slate-400 mt-0.5">Vanilla JS & Tailwind Performance Core</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="telemetry-badge" class="px-2.5 py-1 text-xs font-semibold rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                Telemetry Active
            </div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto space-y-6">

        <section class="bg-slate-800/40 border border-slate-800 p-5 rounded-2xl">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Ingest New Sprint Task</h2>
            <form id="task-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end" onsubmit="handleTaskSubmit(event)">

                <div class="flex flex-col gap-1.5 md:col-span-2">
                    <label for="task-title" class="text-xs font-medium text-slate-400">Task Title / Objective</label>
                    <input type="text" id="task-title" required placeholder="e.g., Optimize backend query routing" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="task-priority" class="text-xs font-medium text-slate-400">Priority Tier</label>
                    <select id="task-priority" class="bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-semibold py-2 px-4 rounded-xl shadow-lg shadow-indigo-600/10 transition duration-150">
                    Deploy Task
                </button>
            </form>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex flex-col min-h-[500px]">
                <div class="flex items-center gap-2 mb-4 px-2">
                    <span class="w-2 h-2 rounded-full bg-rose-500"></span>
                    <h3 class="font-semibold text-slate-200">Backlog / To Do</h3>
                </div>
                <div id="col-todo" class="space-y-3 flex-1 transition-all duration-300"></div>
            </div>

            <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex flex-col min-h-[500px]">
                <div class="flex items-center gap-2 mb-4 px-2">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                    <h3 class="font-semibold text-slate-200">In Flight</h3>
                </div>
                <div id="col-in-progress" class="space-y-3 flex-1 transition-all duration-300"></div>
            </div>

            <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex flex-col min-h-[500px]">
                <div class="flex items-center gap-2 mb-4 px-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    <h3 class="font-semibold text-slate-200">Completed</h3>
                </div>
                <div id="col-done" class="space-y-3 flex-1 transition-all duration-300"></div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
